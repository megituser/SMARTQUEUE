# =============================================================================
# SmartQueue — Test Profile
# =============================================================================
# Uses H2 in-memory DB for fast, isolated integration tests.

spring:
  datasource:
    url: jdbc:h2:mem:smartqueue-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

# ── JWT (test-safe values) ────────────────────────────────────────────────
jwt:
  secret: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3Itc21hcnRxdWV1ZS1pbnRlZ3JhdGlvbi10ZXN0cw==
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.smartqueue: DEBUG
