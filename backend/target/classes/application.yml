# =============================================================================
# SmartQueue — Base Configuration
# =============================================================================
# Profile-specific overrides: application-dev.yml / application-prod.yml
# Activate via: --spring.profiles.active=dev|prod  or  SPRING_PROFILES_ACTIVE env var

server:
  port: 8080
  servlet:
    context-path: /api
  shutdown: graceful

spring:
  application:
    name: smartqueue

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Jackson ──────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ── Lifecycle ────────────────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ── JWT Configuration ──────────────────────────────────────────────────────
# These are top-level (NOT under spring.*) because @Value("${jwt.secret}") expects this.
jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1kZXYtand0LXNlY3JldC1rZXktZm9yLXNtYXJ0cXVldWU=}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ── Logging Defaults ──────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.smartqueue: INFO
    org.springframework.security: INFO